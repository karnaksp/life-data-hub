version: 2

models:
  - name: stg_lifehub_weather_hourly
    description: Hourly public weather forecasts normalized for configured LifeHub locations.
    columns:
      - name: location_id
        tests: [not_null]
      - name: forecast_time
        tests: [not_null]
      - name: fetched_at
        tests: [not_null]

  - name: stg_lifehub_readiness_scores
    description: Outdoor readiness scores computed from weather and scoring config.
    columns:
      - name: activity
        tests:
          - not_null
          - accepted_values:
              values: ['skate', 'snowboard', 'moto_lesson', 'volleyball']
      - name: decision
        tests:
          - not_null
          - accepted_values:
              values: ['go', 'caution', 'skip']
      - name: score
        tests: [not_null]

  - name: stg_lifehub_spots
    description: Public configured or OSM-synced spots. No private addresses.
    columns:
      - name: spot_id
        tests: [not_null, unique]
      - name: label
        tests: [not_null]

  - name: stg_lifehub_recommendation_events
    description: Diary-aware recommendation events generated by LifeHub decision engine.
    columns:
      - name: activity
        tests: [not_null]
      - name: decision
        tests:
          - not_null
          - accepted_values:
              values: ['go', 'caution', 'recover']
      - name: score
        tests: [not_null]

  - name: stg_lifehub_decision_feedback_events
    description: Feedback events that measure whether recommendations were followed, skipped, or changed.
    columns:
      - name: activity
        tests: [not_null]
      - name: action
        tests:
          - not_null
          - accepted_values:
              values: ['followed', 'skipped', 'changed']

  - name: stg_lifehub_signal_events
    description: Local context signals for future market, GitHub, career, wellbeing and system domains.
    columns:
      - name: signal_id
        tests: [not_null]
      - name: domain
        tests:
          - not_null
          - accepted_values:
              values: ['market', 'github', 'career', 'wellbeing', 'system']
      - name: direction
        tests:
          - accepted_values:
              values: ['positive', 'negative', 'neutral']

  - name: stg_lifehub_daily_context_profiles
    description: Privacy-safe daily context profiles that join recommendations, diary aggregates, goals, feedback and external signals.
    columns:
      - name: profile_date
        tests: [not_null]
      - name: timezone
        tests: [not_null]
      - name: top_activity
        tests: [not_null]
      - name: top_score
        tests: [not_null]
      - name: readiness_state
        tests: [not_null]

  - name: mart_lifehub_daily_weather
    description: Daily weather rollup by LifeHub location.
    columns:
      - name: location_id
        tests: [not_null]
      - name: forecast_date
        tests: [not_null]

  - name: mart_lifehub_latest_readiness
    description: Latest readiness decision by activity and location.
    columns:
      - name: activity
        tests: [not_null]
      - name: location_id
        tests: [not_null]

  - name: mart_lifehub_recommendation_daily
    description: Daily recommendation volume and average scores for useful decision tracking.
    columns:
      - name: recommendation_date
        tests: [not_null]
      - name: activity
        tests: [not_null]

  - name: mart_lifehub_decision_feedback_daily
    description: Daily recommendation feedback by activity and action.
    columns:
      - name: feedback_date
        tests: [not_null]
      - name: action
        tests: [not_null]

  - name: mart_lifehub_useful_decision_days
    description: Weekly North Star metric for days where LifeHub helped drive a followed decision.
    columns:
      - name: week_start
        tests: [not_null]

  - name: mart_lifehub_signal_daily
    description: Daily context signal volume and severity by future integration domain.
    columns:
      - name: signal_date
        tests: [not_null]
      - name: domain
        tests: [not_null]

  - name: mart_lifehub_activity_feedback_profile
    description: Thirty-day aggregate feedback profile used to personalize recommendations by activity.
    columns:
      - name: activity
        tests: [not_null]
      - name: follow_rate
        tests: [not_null]

  - name: mart_lifehub_daily_context_latest
    description: Latest product-level daily decision profile per local date and timezone.
    columns:
      - name: profile_date
        tests: [not_null]
      - name: top_activity
        tests: [not_null]
      - name: readiness_state
        tests: [not_null]
