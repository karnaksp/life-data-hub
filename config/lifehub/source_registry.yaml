version: 1
owner: local-data-engineering
privacy: local_only
default_lake_bucket: iceberg
default_checkpoint_bucket: checkpoints
source_architecture:
  goal: full personal data coverage with privacy-safe local-first ingestion
  tier_policy:
    tier_1_foundation:
      description: low-risk public, synthetic, derived, or coarse personal summaries used by the MVP today
      default_raw_policy: commit synthetic fixtures and public API examples only
      default_local_policy: may land privacy-safe envelopes in local lakehouse
    tier_2_personal_context:
      description: personal context needed for useful recommendations but safe after summarization
      default_raw_policy: keep raw exports local; land redacted or aggregate records only
      default_local_policy: local lakehouse allowed after minimization
    tier_3_sensitive_life:
      description: health, finance, location, communications, identity, or relationship data
      default_raw_policy: raw exports never committed and never copied into public evidence
      default_local_policy: local encrypted raw vault only; analytics use summaries or derived features
    tier_4_private_core:
      description: secrets, credentials, legal records, intimate notes, private media, and irreversible identifiers
      default_raw_policy: do not ingest raw payloads into shared bronze; store pointers or user-approved derived facts only
      default_local_policy: explicit opt-in per source; redaction review required before any lake export
  privacy_classes:
    public_context: public weather, map, market, or open-source context without user identifiers
    derived_context: model, scoring, weekly, or daily aggregates that do not expose raw personal rows
    private_behavior_summary: activity, habit, preference, and feedback summaries without free text
    private_location_summary: coarse route, visit, commute, or geofence summaries without home/work addresses
    private_health_summary: sleep, recovery, nutrition, medication, and biometric summaries without raw device exports
    private_finance_summary: balances, spending categories, broker snapshots, and budget aggregates without account numbers
    private_communications_summary: message, call, mail, and notification metadata summaries without content bodies
    private_identity_document: identity, legal, tax, insurance, and official records; raw payloads are tier_4 only
    secret_credential: tokens, passwords, API keys, chat ids, cookies, private keys; never part of event payloads
  universal_envelope_fields:
    - lake_version
    - source_name
    - source_tier
    - source_type
    - event_type
    - event_time
    - ingested_at
    - privacy_class
    - consent_scope
    - subject_id
    - schema_version
    - idempotency_key
    - provenance
    - raw_policy
    - local_policy
    - payload
  raw_local_policies:
    public_fixture_ok: synthetic fixtures and public API examples may be committed
    local_raw_only: real raw exports stay on ignored local paths outside git
    summarized_landing_only: landing files contain summaries, redacted metrics, or derived facts only
    no_shared_bronze_raw: source may not write raw payloads to shared bronze
    secrets_forbidden: credentials, tokens, chat ids, cookies, and private keys are forbidden in payloads
medallion_layers:
  landing:
    purpose: raw source-shaped files before table ingestion
    path_template: s3a://iceberg/lifehub/landing/{source_name}/dt={dt}/events.jsonl
    format: jsonl
  bronze:
    purpose: append-only source event envelopes with ingestion metadata
    table_template: iceberg.bronze.lifehub_{source_name}_events
    checkpoint_template: s3a://checkpoints/lifehub/bronze/{source_name}
  silver:
    purpose: typed and privacy-filtered events ready for analytics
    table_template: iceberg.silver.lifehub_{source_name}
  gold:
    purpose: decision-oriented marts and daily profiles
    table_template: iceberg.gold.lifehub_{source_name}_mart

sources:
  weather_forecast:
    tier: tier_1_foundation
    domain: weather
    source_type: public_api
    privacy_class: public_context
    raw_policy: public_fixture_ok
    local_policy: summarized_landing_only
    producer: lifehub-weather-ingest
    landing_path: s3a://iceberg/lifehub/landing/weather_forecast/dt={dt}/events.jsonl
    bronze_table: iceberg.bronze.lifehub_weather_forecast_events
    silver_table: iceberg.silver.lifehub_weather_hourly
    consumers: [readiness_scoring, daily_context_profile]
    pii: false
    onboarding_contract:
      required_fields: [location_id, forecast_time, temperature_c, precipitation_mm, fetched_at]
      event_time_field: forecast_time
      idempotency_key: [location_id, forecast_time, fetched_at]

  place_spots:
