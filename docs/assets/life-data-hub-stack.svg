<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Life Data Hub stack diagram</title>
  <desc id="desc">Data engineering stack diagram showing sources, ingestion, storage, processing, orchestration, quality and product surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f7f2ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .lane-title { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .card-title { font: 700 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .card-text { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tag { font: 700 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .lane { fill: rgba(255,255,255,0.72); stroke: #d9e2ec; stroke-width: 1; }
      .card { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.2; filter: url(#shadow); }
      .source { stroke: #60a5fa; }
      .ingest { stroke: #22c55e; }
      .store { stroke: #f59e0b; }
      .compute { stroke: #a855f7; }
      .ops { stroke: #14b8a6; }
      .surface { stroke: #ef4444; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow); }
      .soft-arrow { fill: none; stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 6 6; marker-end: url(#arrow-soft); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1280" height="820" rx="28" fill="url(#bg)"/>
  <text x="48" y="64" class="title">Life Data Hub: локальная data engineering платформа</text>
  <text x="50" y="94" class="subtitle">Источники → ingestion → lakehouse/DWH → orchestration/DataOps → Telegram, cockpit и ежедневные решения</text>

  <rect x="38" y="126" width="1204" height="118" rx="18" class="lane"/>
  <text x="62" y="158" class="lane-title">1. Источники данных</text>
  <g transform="translate(60 178)">
    <rect width="148" height="46" rx="12" class="card source"/>
    <text x="18" y="29" class="card-title">Open-Meteo</text>
  </g>
  <g transform="translate(226 178)">
    <rect width="148" height="46" rx="12" class="card source"/>
    <text x="18" y="29" class="card-title">OSM / Overpass</text>
  </g>
  <g transform="translate(392 178)">
    <rect width="148" height="46" rx="12" class="card source"/>
    <text x="18" y="29" class="card-title">Telegram diary</text>
  </g>
  <g transform="translate(558 178)">
    <rect width="148" height="46" rx="12" class="card source"/>
    <text x="18" y="29" class="card-title">GPX / files</text>
  </g>
  <g transform="translate(724 178)">
    <rect width="148" height="46" rx="12" class="card source"/>
    <text x="18" y="29" class="card-title">Sleep quality</text>
  </g>
  <g transform="translate(890 178)">
    <rect width="148" height="46" rx="12" class="card source"/>
    <text x="18" y="29" class="card-title">GitHub signals</text>
  </g>
  <g transform="translate(1056 178)">
    <rect width="148" height="46" rx="12" class="card source"/>
    <text x="18" y="29" class="card-title">Market signals</text>
  </g>

  <rect x="38" y="272" width="1204" height="168" rx="18" class="lane"/>
  <text x="62" y="304" class="lane-title">2. Ingestion и event layer</text>
  <g transform="translate(60 326)">
    <rect width="194" height="82" rx="14" class="card ingest"/>
    <text x="18" y="30" class="card-title">Python services</text>
    <text x="18" y="54" class="card-text">weather, places, signals</text>
  </g>
  <g transform="translate(280 326)">
    <rect width="194" height="82" rx="14" class="card ingest"/>
    <text x="18" y="30" class="card-title">Telegram bot</text>
    <text x="18" y="54" class="card-text">commands, diary, digest</text>
  </g>
  <g transform="translate(500 326)">
    <rect width="194" height="82" rx="14" class="card ingest"/>
    <text x="18" y="30" class="card-title">Landing JSONL</text>
    <text x="18" y="54" class="card-text">privacy-safe events</text>
  </g>
  <g transform="translate(720 326)">
    <rect width="194" height="82" rx="14" class="card ingest"/>
    <text x="18" y="30" class="card-title">Kafka + Debezium</text>
    <text x="18" y="54" class="card-text">CDC engineering lab</text>
  </g>
  <g transform="translate(940 326)">
    <rect width="236" height="82" rx="14" class="card ingest"/>
    <text x="18" y="30" class="card-title">Source onboarding</text>
    <text x="18" y="54" class="card-text">registry, fixtures, runbooks</text>
  </g>

  <rect x="38" y="468" width="1204" height="170" rx="18" class="lane"/>
  <text x="62" y="500" class="lane-title">3. Storage, lakehouse и processing</text>
  <g transform="translate(60 522)">
    <rect width="162" height="82" rx="14" class="card store"/>
    <text x="18" y="30" class="card-title">Postgres</text>
    <text x="18" y="54" class="card-text">operational state</text>
  </g>
  <g transform="translate(244 522)">
    <rect width="162" height="82" rx="14" class="card store"/>
    <text x="18" y="30" class="card-title">ClickHouse</text>
    <text x="18" y="54" class="card-text">fast analytical marts</text>
  </g>
  <g transform="translate(428 522)">
    <rect width="162" height="82" rx="14" class="card store"/>
    <text x="18" y="30" class="card-title">MinIO</text>
    <text x="18" y="54" class="card-text">S3 object storage</text>
  </g>
  <g transform="translate(612 522)">
    <rect width="162" height="82" rx="14" class="card compute"/>
    <text x="18" y="30" class="card-title">Spark</text>
    <text x="18" y="54" class="card-text">batch/load jobs</text>
  </g>
  <g transform="translate(796 522)">
    <rect width="162" height="82" rx="14" class="card store"/>
    <text x="18" y="30" class="card-title">Iceberg</text>
    <text x="18" y="54" class="card-text">Bronze/Silver/Gold</text>
  </g>
  <g transform="translate(980 522)">
    <rect width="162" height="82" rx="14" class="card compute"/>
    <text x="18" y="30" class="card-title">Trino</text>
    <text x="18" y="54" class="card-text">DWH SQL access</text>
  </g>

  <rect x="38" y="666" width="582" height="108" rx="18" class="lane"/>
  <text x="62" y="698" class="lane-title">4. Orchestration и DataOps</text>
  <g transform="translate(60 718)">
    <rect width="116" height="36" rx="11" class="card ops"/>
    <text x="18" y="24" class="tag">Airflow</text>
  </g>
  <g transform="translate(190 718)">
    <rect width="116" height="36" rx="11" class="card ops"/>
    <text x="18" y="24" class="tag">Temporal</text>
  </g>
  <g transform="translate(320 718)">
    <rect width="116" height="36" rx="11" class="card ops"/>
    <text x="18" y="24" class="tag">dbt SQL</text>
  </g>
  <g transform="translate(450 718)">
    <rect width="138" height="36" rx="11" class="card ops"/>
    <text x="18" y="24" class="tag">Contracts</text>
  </g>

  <rect x="658" y="666" width="584" height="108" rx="18" class="lane"/>
  <text x="682" y="698" class="lane-title">5. Product surfaces</text>
  <g transform="translate(680 718)">
    <rect width="146" height="36" rx="11" class="card surface"/>
    <text x="18" y="24" class="tag">Telegram digest</text>
  </g>
  <g transform="translate(846 718)">
    <rect width="134" height="36" rx="11" class="card surface"/>
    <text x="18" y="24" class="tag">LifeHub cockpit</text>
  </g>
  <g transform="translate(1000 718)">
    <rect width="192" height="36" rx="11" class="card surface"/>
    <text x="18" y="24" class="tag">Evidence &amp; lineage</text>
  </g>

  <path d="M 640 244 L 640 318" class="arrow"/>
  <path d="M 640 408 L 640 514" class="arrow"/>
  <path d="M 1060 604 L 1060 710" class="arrow"/>
  <path d="M 520 604 C 500 650 460 690 380 714" class="soft-arrow"/>
  <path d="M 890 604 C 920 650 960 684 1050 710" class="soft-arrow"/>

  <g transform="translate(62 116)">
    <rect width="110" height="28" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="16" y="19" class="small">local first</text>
  </g>
  <g transform="translate(184 116)">
    <rect width="154" height="28" rx="14" fill="#dcfce7" stroke="#86efac"/>
    <text x="16" y="19" class="small">privacy-safe fixtures</text>
  </g>
  <g transform="translate(350 116)">
    <rect width="160" height="28" rx="14" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="16" y="19" class="small">Saint Petersburg</text>
  </g>
</svg>
