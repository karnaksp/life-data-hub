<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980" role="img" aria-labelledby="title desc">
  <title id="title">Life Data Hub pipeline flow</title>
  <desc id="desc">A numbered flow diagram explaining what happens at every step of the Life Data Hub data engineering stack.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="62%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f7f2ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 800 36px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .step-title { font: 800 19px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .purpose { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .card-title { font: 800 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .card-text { font: 500 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .badge { font: 800 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .note { font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .rail { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.2; filter: url(#shadow); }
      .step { fill: rgba(255,255,255,0.78); stroke: #d9e2ec; stroke-width: 1.2; }
      .card { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.1; }
      .arrow { fill: none; stroke: #475569; stroke-width: 2.6; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #94a3b8; stroke-width: 2.1; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
  <text x="54" y="66" class="title">Life Data Hub: что за чем идёт и зачем</text>
  <text x="56" y="98" class="subtitle">От источников и дневника до lakehouse, проверок качества и персонального решения “что делать сегодня”.</text>

  <rect x="54" y="126" width="1572" height="82" rx="18" class="rail"/>
  <text x="84" y="157" class="note">Основной поток данных</text>
  <text x="84" y="181" class="purpose">Сначала собираем события, затем сохраняем raw/state, нормализуем, строим витрины и проверяем качество.</text>
  <text x="84" y="199" class="purpose">Только после этого продуктовый слой получает готовую рекомендацию, а не читает хаотичные API напрямую.</text>

  <g transform="translate(54 238)">
    <rect width="190" height="518" rx="18" class="step"/>
    <circle cx="28" cy="30" r="18" fill="#2563eb"/>
    <text x="23" y="35" class="badge">1</text>
    <text x="54" y="36" class="step-title">Источники</text>
    <text x="18" y="70" class="purpose">Что реально происходит</text>
    <text x="18" y="91" class="purpose">в жизни и вокруг.</text>

    <g transform="translate(18 122)">
      <rect width="154" height="56" rx="12" class="card"/>
      <circle cx="24" cy="28" r="15" fill="#38bdf8"/><text x="16" y="32" class="badge">WX</text>
      <text x="48" y="25" class="card-title">Open-Meteo</text>
      <text x="48" y="43" class="card-text">погода и прогноз</text>
    </g>
    <g transform="translate(18 190)">
      <rect width="154" height="56" rx="12" class="card"/>
      <circle cx="24" cy="28" r="15" fill="#7c3aed"/><text x="15" y="32" class="badge">OSM</text>
      <text x="48" y="25" class="card-title">Overpass</text>
      <text x="48" y="43" class="card-text">места и споты</text>
    </g>
    <g transform="translate(18 258)">
      <rect width="154" height="56" rx="12" class="card"/>
      <circle cx="24" cy="28" r="15" fill="#229ED9"/><text x="16" y="32" class="badge">TG</text>
      <text x="48" y="25" class="card-title">Telegram</text>
      <text x="48" y="43" class="card-text">дневник и команды</text>
    </g>
    <g transform="translate(18 326)">
      <rect width="154" height="56" rx="12" class="card"/>
      <circle cx="24" cy="28" r="15" fill="#16a34a"/><text x="15" y="32" class="badge">GPX</text>
      <text x="48" y="25" class="card-title">Файлы</text>
      <text x="48" y="43" class="card-text">GPX, sleep, JSON</text>
    </g>
    <g transform="translate(18 394)">
      <rect width="154" height="56" rx="12" class="card"/>
      <circle cx="24" cy="28" r="15" fill="#0f172a"/><text x="16" y="32" class="badge">GH</text>
      <text x="48" y="25" class="card-title">Сигналы</text>
      <text x="48" y="43" class="card-text">GitHub, market</text>
    </g>
  </g>

  <path d="M 254 496 L 306 496" class="arrow"/>

  <g transform="translate(306 238)">
    <rect width="190" height="518" rx="18" class="step"/>
    <circle cx="28" cy="30" r="18" fill="#16a34a"/>
    <text x="23" y="35" class="badge">2</text>
    <text x="54" y="36" class="step-title">Ingestion</text>
    <text x="18" y="70" class="purpose">Приводим всё к</text>
    <text x="18" y="91" class="purpose">событиям и контрактам.</text>

    <g transform="translate(18 122)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#3776ab"/><text x="16" y="34" class="badge">PY</text>
      <text x="48" y="25" class="card-title">Python services</text>
      <text x="48" y="43" class="card-text">fetch, normalize</text>
    </g>
    <g transform="translate(18 202)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#229ED9"/><text x="16" y="34" class="badge">TG</text>
      <text x="48" y="25" class="card-title">Bot handler</text>
      <text x="48" y="43" class="card-text">parse /log, /today</text>
    </g>
    <g transform="translate(18 282)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#f97316"/><text x="14" y="34" class="badge">SRC</text>
      <text x="48" y="25" class="card-title">Onboarding</text>
      <text x="48" y="43" class="card-text">fixtures, registry</text>
    </g>
    <g transform="translate(18 362)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#231f20"/><text x="14" y="34" class="badge">KFK</text>
      <text x="48" y="25" class="card-title">Kafka CDC</text>
      <text x="48" y="43" class="card-text">retail lab stream</text>
    </g>
  </g>

  <path d="M 506 496 L 558 496" class="arrow"/>

  <g transform="translate(558 238)">
    <rect width="190" height="518" rx="18" class="step"/>
    <circle cx="28" cy="30" r="18" fill="#f59e0b"/>
    <text x="23" y="35" class="badge">3</text>
    <text x="54" y="36" class="step-title">Raw и state</text>
    <text x="18" y="70" class="purpose">Храним факты без</text>
    <text x="18" y="91" class="purpose">потери контекста.</text>

    <g transform="translate(18 122)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#4169e1"/><text x="16" y="34" class="badge">PG</text>
      <text x="48" y="25" class="card-title">Postgres</text>
      <text x="48" y="43" class="card-text">настройки, дневник</text>
    </g>
    <g transform="translate(18 202)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#ff6600"/><text x="12" y="34" class="badge">MIN</text>
      <text x="48" y="25" class="card-title">MinIO</text>
      <text x="48" y="43" class="card-text">landing JSONL</text>
    </g>
    <g transform="translate(18 282)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#ffcc01"/><text x="15" y="34" class="badge" fill="#111827">CH</text>
      <text x="48" y="25" class="card-title">ClickHouse</text>
      <text x="48" y="43" class="card-text">time-series events</text>
    </g>
    <g transform="translate(18 362)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#64748b"/><text x="14" y="34" class="badge">RAW</text>
      <text x="48" y="25" class="card-title">Bronze truth</text>
      <text x="48" y="43" class="card-text">аудит и replay</text>
    </g>
  </g>

  <path d="M 758 496 L 810 496" class="arrow"/>

  <g transform="translate(810 238)">
    <rect width="190" height="518" rx="18" class="step"/>
    <circle cx="28" cy="30" r="18" fill="#7c3aed"/>
    <text x="23" y="35" class="badge">4</text>
    <text x="54" y="36" class="step-title">Transform</text>
    <text x="18" y="70" class="purpose">Делаем из raw данных</text>
    <text x="18" y="91" class="purpose">аналитические слои.</text>

    <g transform="translate(18 122)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#e25a1c"/><text x="14" y="34" class="badge">SPK</text>
      <text x="48" y="25" class="card-title">Spark</text>
      <text x="48" y="43" class="card-text">load и normalize</text>
    </g>
    <g transform="translate(18 202)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#0ea5e9"/><text x="13" y="34" class="badge">ICE</text>
      <text x="48" y="25" class="card-title">Iceberg</text>
      <text x="48" y="43" class="card-text">Bronze/Silver/Gold</text>
    </g>
    <g transform="translate(18 282)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#dd5a6f"/><text x="14" y="34" class="badge">TRI</text>
      <text x="48" y="25" class="card-title">Trino</text>
      <text x="48" y="43" class="card-text">SQL поверх lake</text>
    </g>
    <g transform="translate(18 362)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#ff694b"/><text x="16" y="34" class="badge">dbt</text>
      <text x="48" y="25" class="card-title">dbt SQL</text>
      <text x="48" y="43" class="card-text">staging и marts</text>
    </g>
  </g>

  <path d="M 1010 496 L 1062 496" class="arrow"/>

  <g transform="translate(1062 238)">
    <rect width="190" height="518" rx="18" class="step"/>
    <circle cx="28" cy="30" r="18" fill="#0f766e"/>
    <text x="23" y="35" class="badge">5</text>
    <text x="54" y="36" class="step-title">Control</text>
    <text x="18" y="70" class="purpose">Запускаем, проверяем</text>
    <text x="18" y="91" class="purpose">и оставляем evidence.</text>

    <g transform="translate(18 122)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#017cee"/><text x="13" y="34" class="badge">AIR</text>
      <text x="48" y="25" class="card-title">Airflow</text>
      <text x="48" y="43" class="card-text">scheduled DAGs</text>
    </g>
    <g transform="translate(18 202)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#141e33"/><text x="13" y="34" class="badge">TMP</text>
      <text x="48" y="25" class="card-title">Temporal</text>
      <text x="48" y="43" class="card-text">durable workflows</text>
    </g>
    <g transform="translate(18 282)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#0891b2"/><text x="13" y="34" class="badge">QTY</text>
      <text x="48" y="25" class="card-title">Contracts</text>
      <text x="48" y="43" class="card-text">quality gates</text>
    </g>
    <g transform="translate(18 362)">
      <rect width="154" height="64" rx="12" class="card"/>
      <circle cx="24" cy="30" r="15" fill="#64748b"/><text x="14" y="34" class="badge">LIN</text>
      <text x="48" y="25" class="card-title">Lineage</text>
      <text x="48" y="43" class="card-text">evidence и audit</text>
    </g>
  </g>

  <path d="M 1262 496 L 1314 496" class="arrow"/>

  <g transform="translate(1196 238)">
    <path d="M 0 434 C -170 470 -420 470 -612 430" class="feedback"/>
    <text x="-420" y="494" class="purpose">feedback loop: дневник + сон -> следующая рекомендация</text>
  </g>

  <g transform="translate(1314 238)">
    <rect width="220" height="518" rx="18" class="step"/>
    <circle cx="28" cy="30" r="18" fill="#dc2626"/>
    <text x="23" y="35" class="badge">6</text>
    <text x="54" y="36" class="step-title">Product</text>
    <text x="18" y="70" class="purpose">Отдаём человеку</text>
    <text x="18" y="91" class="purpose">понятное действие.</text>
    <g transform="translate(18 142)">
      <rect width="184" height="72" rx="12" class="card"/>
      <circle cx="26" cy="35" r="16" fill="#229ED9"/><text x="17" y="39" class="badge">TG</text>
      <text x="54" y="30" class="card-title">Telegram digest</text>
      <text x="54" y="49" class="card-text">/today, /week, alerts</text>
    </g>
    <g transform="translate(18 238)">
      <rect width="184" height="72" rx="12" class="card"/>
      <circle cx="26" cy="35" r="16" fill="#0f766e"/><text x="18" y="39" class="badge">UI</text>
      <text x="54" y="30" class="card-title">LifeHub cockpit</text>
      <text x="54" y="49" class="card-text">аналитика и обзор</text>
    </g>
    <g transform="translate(18 334)">
      <rect width="184" height="72" rx="12" class="card"/>
      <circle cx="26" cy="35" r="16" fill="#dc2626"/><text x="17" y="39" class="badge">OK</text>
      <text x="54" y="30" class="card-title">Decision</text>
      <text x="54" y="49" class="card-text">skate, moto, rest</text>
    </g>
  </g>

  <rect x="54" y="800" width="1572" height="112" rx="18" class="rail"/>
  <text x="84" y="834" class="note">Почему такой порядок важен</text>
  <text x="84" y="860" class="purpose">Raw слой сохраняет факты и даёт replay. Transform слой делает данные пригодными для SQL и моделей.</text>
  <text x="84" y="884" class="purpose">Control слой доказывает, что pipeline не сломан. Product слой получает проверенные витрины, readiness score и объяснения для Telegram digest.</text>
  <text x="84" y="908" class="purpose">Все приватные данные остаются локально; public repo содержит только fixtures, redacted evidence и контракты.</text>
</svg>
